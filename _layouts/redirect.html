<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting… · {{ site.title }}</title>
  <link rel="canonical" href="{{ page.redirect.to }}">
  <meta http-equiv="refresh" content="0; url={{ page.redirect.to }}">
  <meta name="robots" content="noindex">
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #d1d5db;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    a { color: #22d3ee; }
  </style>
</head>
<body>
  <p>Redirecting to <a href="{{ page.redirect.to }}">{{ page.redirect.to }}</a>&hellip;</p>
  <script>window.location.replace("{{ page.redirect.to }}");</script>
</body>
</html>
