---
layout: default
---

<div class="px-6 lg:px-10 py-8 max-w-4xl">
  <article>
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-slate-50">{{ page.title }}</h1>
      {% if page.description and page.hide_description != true %}
      <p class="text-gray-600 dark:text-slate-400 mt-2">{{ page.description }}</p>
      {% endif %}
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
