<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" class="dark" data-baseurl="{{ site.baseurl }}">
<head>
  {% include head.html %}
</head>
<body class="bg-white dark:bg-slate-900 text-gray-900 dark:text-slate-300 antialiased">

  <!-- Dark mode flash prevention: applied synchronously before paint -->
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'light' || (!stored && !prefersDark)) {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  {{ content }}

  <!-- Core JS -->
  <script src="{{ '/assets/js/dark-mode.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/sidebar.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/vendor/lunr.min.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/code-blocks.js' | relative_url }}" defer></script>
  {% if page.no_toc != true %}
  <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>
  {% endif %}
  {% if page.image_zoom != false %}
  <script src="{{ '/assets/js/vendor/medium-zoom.min.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/zoom.js' | relative_url }}" defer></script>
  {% endif %}

  {% include my-body.html %}
  {% include my-scripts.html %}

  <!-- Cloudflare Web Analytics -->
  {% if jekyll.environment == 'production' and site.cloudflare_analytics %}
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
          data-cf-beacon='{"token": "{{ site.cloudflare_analytics }}"}'></script>
  {% endif %}

</body>
</html>
