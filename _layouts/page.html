---
layout: default
---

<div class="px-6 lg:px-10 py-8 max-w-4xl">

  {% unless page.hide_description %}
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-slate-50 leading-tight">{{ page.title }}</h1>
    {% if page.description %}
    <p class="text-gray-600 dark:text-slate-400 mt-2 text-lg">{{ page.description }}</p>
    {% endif %}
  </header>
  {% endunless %}

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.comments %}
  <div class="mt-12 pt-8 border-t border-gray-200 dark:border-slate-700">
    {% include utterances-comment.html %}
  </div>
  {% endif %}

</div>
