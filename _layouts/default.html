---
layout: base
---

<!-- Mobile top bar -->
<header class="topbar">
  <a href="{{ '/' | relative_url }}" class="flex items-center gap-2 text-gray-900 dark:text-slate-50 font-semibold text-sm no-underline truncate">
    {{ site.title }}
    <img src="{{ '/media/stealthpuppy.png' | relative_url }}" alt="" aria-hidden="true" class="w-6 h-6 rounded-sm flex-shrink-0">
  </a>
  <div class="flex items-center gap-1">
    <button id="search-btn" class="dark-toggle" aria-label="Search">
      {% include icons/search.svg %}
    </button>
    <button id="dark-toggle-mobile" class="dark-toggle" aria-label="Toggle dark mode">
      <span class="dark:hidden">{% include icons/moon.svg %}</span>
      <span class="hidden dark:inline">{% include icons/sun.svg %}</span>
    </button>
    <button id="sidebar-toggle" class="dark-toggle lg:hidden" aria-label="Open navigation">
      {% include icons/menu.svg %}
    </button>
  </div>
</header>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-20 hidden lg:hidden" aria-hidden="true"></div>

<!-- Sidebar -->
{% include sidebar.html %}

<!-- Main content area (offset by sidebar width on desktop) -->
<main id="main-content" class="main-content">
  {{ content }}
  {% include footer.html %}
</main>

<!-- Search modal -->
{% include search-modal.html %}

<!-- Back to top -->
<button id="back-to-top" class="back-to-top" aria-label="Back to top">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
