---
layout: default
---

<div class="px-6 lg:px-10 py-16 max-w-2xl">
  <h1 class="text-4xl font-bold text-gray-900 dark:text-slate-50 mb-4">{{ page.title | default: "404 — Page Not Found" }}</h1>
  <div class="w-12 h-px mb-6" style="background-color: var(--color-accent)"></div>

  {% if page.content and page.content != "" %}
    <div class="post-content">{{ content }}</div>
  {% else %}
    <p class="text-gray-600 dark:text-slate-400 text-lg">
      Sorry, we've misplaced that URL or it's pointing to something that doesn't exist.
      <a href="{{ '/' | relative_url }}">Head back home</a> to try finding it again.
    </p>
  {% endif %}
</div>
