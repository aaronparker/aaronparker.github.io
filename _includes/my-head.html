<!-- Gumroad embed — lazy-loaded when product embeds or buttons scroll into view -->
<link rel="dns-prefetch" href="https://assets.gumroad.com">
<script>
(function () {
  var embedLoaded = false;
  var overlayLoaded = false;

  function loadScript(src, callback) {
    var s = document.createElement('script');
    s.src = src;
    s.async = true;
    if (callback) s.onload = callback;
    document.head.appendChild(s);
  }

  function initGumroad() {
    var embedEls = document.querySelectorAll('.gumroad-product-embed');
    var buttonEls = document.querySelectorAll('.gumroad-button');

    if (!embedEls.length && !buttonEls.length) return;

    var io1 = new IntersectionObserver(function (entries) {
      if (entries.some(function (e) { return e.isIntersecting; })) {
        if (!embedLoaded) {
          embedLoaded = true;
          loadScript('https://gumroad.com/js/gumroad-embed.js', function () {
            if (typeof createGumroadEmbed !== 'undefined') createGumroadEmbed();
          });
        } else if (typeof GumroadEmbed !== 'undefined') {
          GumroadEmbed.reload();
        }
      }
    }, { rootMargin: '1440px' });

    var io2 = new IntersectionObserver(function (entries) {
      if (entries.some(function (e) { return e.isIntersecting; })) {
        if (!overlayLoaded) {
          overlayLoaded = true;
          loadScript('https://gumroad.com/js/gumroad.js', function () {
            if (typeof createGumroadOverlay !== 'undefined') createGumroadOverlay();
          });
        }
      }
    }, { rootMargin: '300px' });

    embedEls.forEach(function (el) { io1.observe(el); });
    buttonEls.forEach(function (el) { io2.observe(el); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGumroad);
  } else {
    initGumroad();
  }
})();
</script>
