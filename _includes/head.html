<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
  {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
</title>

{% seo %}

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/icons/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/assets/site.webmanifest' | relative_url }}">

<!-- Theme colour for mobile browser UI -->
<meta name="theme-color" content="{{ site.theme_color | default: '#0a0a0a' }}">

<!-- Tailwind CSS (built by npm run build) -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- Self-hosted Geist fonts (copied by npm run build:fonts) -->
<link rel="stylesheet" href="{{ '/assets/fonts/geist/index.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/fonts/geist-mono/index.css' | relative_url }}">

<!-- Feed -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

<!-- DNS prefetch for external services -->
<link rel="dns-prefetch" href="https://assets.gumroad.com">
<link rel="dns-prefetch" href="https://utteranc.es">

{% include my-head.html %}
