<!-- Theme init: runs before CSS loads to prevent flash -->
<script>
  (function() {
    var stored = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'light' || (!stored && !prefersDark)) {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
    var accent = localStorage.getItem('accent-theme');
    if (accent) document.documentElement.classList.add('theme-' + accent);
  })();
</script>
<!-- Inline dark background prevents white flash before style.css loads -->
<style>html.dark{background:#0f172a}</style>
