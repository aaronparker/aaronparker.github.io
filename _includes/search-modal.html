<div id="search-overlay" class="search-overlay hidden" role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-modal">
    <div class="relative">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input"
             type="search"
             class="search-input pl-10"
             placeholder="Search posts…"
             autocomplete="off"
             spellcheck="false">
      <button id="search-close" class="absolute right-3 top-1/2 -translate-y-1/2 dark-toggle" aria-label="Close search">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="search-results" class="search-results" role="listbox"></div>
    <div id="search-status" role="status" aria-live="polite" aria-atomic="true"
         class="sr-only"></div>
    <div class="search-hint">
      <kbd class="px-1 py-0.5 rounded border border-gray-300 dark:border-slate-600 text-gray-500 dark:text-slate-500 font-mono text-xs">Esc</kbd>
      to close
    </div>
  </div>
</div>
