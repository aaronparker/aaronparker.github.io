<!--
Cloudflare email protection decoder — runs on DOMContentLoaded for standard multi-page navigation.
-->
<script>
(function () {
  function decodeEmail(encoded) {
    var div = document.createElement('div');
    function fromHex(s, i) { return parseInt(s.substr(i, 2), 16); }
    function decode(s) {
      var key = fromHex(s, 0), out = '';
      for (var i = 2; i < s.length; i += 2) {
        out += String.fromCharCode(fromHex(s, i) ^ key);
      }
      div.innerHTML = '<a href="' + out.replace(/"/g, '&quot;') + '"></a>';
      return div.childNodes[0].getAttribute('href');
    }

    var prefix = '/cdn-cgi/l/email-protection#';
    var cfClass = '.__cf_email__';
    var cfAttr = 'data-cfemail';

    // Decode obfuscated mailto links
    var links = document.getElementsByTagName('a');
    for (var i = 0; i < links.length; i++) {
      try {
        var idx = links[i].href.indexOf(prefix);
        if (idx > -1) links[i].href = 'mailto:' + decode(links[i].href.slice(idx + prefix.length));
      } catch (e) { console.error(e); }
    }

    // Decode obfuscated email spans
    var spans = document.querySelectorAll(cfClass);
    for (var j = 0; j < spans.length; j++) {
      try {
        var text = decode(spans[j].getAttribute(cfAttr));
        spans[j].parentNode.replaceChild(document.createTextNode(text), spans[j]);
      } catch (e) { console.error(e); }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', decodeEmail);
  } else {
    decodeEmail();
  }
})();
</script>
